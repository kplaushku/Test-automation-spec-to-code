schema_version: "1.0"

extension:
  id: qa
  name: "Live QA & Locator Binding"
  version: "0.1.0"
  description: "Browser-driven QA for Specto: bind structural locators from a live app, run generated UI suites with evidence, and root-cause failures. Closes the app-access gap for UI/web tests."
  category: visibility
  effect: read-write
  author: "Specto authors"
  repository: "https://github.com/kplaushku/Test-automation-spec-to-code"
  license: MIT

requires:
  speckit_version: ">=0.9.0"
  # Optional browser drivers. Any ONE satisfies the UI/web commands; the
  # commands probe for whichever is available and fall back in this order.
  # None are hard-required because API/contract testing needs no app access.
  tools:
    - name: "claude-in-chrome"
      required: false
    - name: "claude-preview"
      required: false
    - name: "computer-use"
      required: false

provides:
  commands:
    - name: speckit.qa.bind-locators
      file: commands/speckit.qa.bind-locators.md
      description: "Open the live app via a browser, read the DOM/accessibility tree, and resolve the structural locators that UI adapters left as placeholders"
      aliases: ["speckit.qa.bind"]
    - name: speckit.qa.run
      file: commands/speckit.qa.run.md
      description: "Run the generated suite for a feature; for UI/web failures, capture screenshot + DOM evidence and propose a fix"
    - name: speckit.qa.investigate
      file: commands/speckit.qa.investigate.md
      description: "Root-cause a single failing test: reproduce, inspect console/network, isolate, propose the minimal fix"

  config:
    - name: "qa-config.yml"
      template: "config-template.yml"
      description: "QA driver, base URL, and viewport configuration"
      required: false

# Offer QA right after tests are generated.
hooks:
  after_implement:
    command: "speckit.qa.run"
    optional: true
    prompt: "Run the generated suite now and QA any UI failures with the browser?"
    description: "Run + QA the suite after implementation"

tags:
  - "qa"
  - "browser"
  - "ui-testing"
  - "locators"
  - "testing"
