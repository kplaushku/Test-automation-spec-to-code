schema_version: "1.0"

extension:
  id: ci
  name: "CI Recipes"
  version: "0.1.0"
  description: "Generate CI config that runs the generated suite, runs quarantined flaky tests apart, and publishes the traceability matrix and reliability score - so reliability is visible on every push."
  category: integration
  effect: read-write
  author: "Specto authors"
  repository: "https://github.com/kplaushku/Test-automation-spec-to-code"
  license: MIT

requires:
  speckit_version: ">=0.9.0"

provides:
  commands:
    - name: speckit.ci.generate
      file: commands/speckit.ci.generate.md
      description: "Generate a CI workflow (GitHub Actions or GitLab CI) for the suite: install, run per framework, run quarantined flaky tests in a non-blocking job, and publish traceability + reliability as artifacts"
      aliases: ["speckit.ci"]

  config:
    - name: "ci-config.yml"
      template: "config-template.yml"
      description: "CI provider, triggers, and how to treat quarantined flaky tests"
      required: false

tags:
  - "ci"
  - "github-actions"
  - "gitlab"
  - "reliability"
  - "testing"
