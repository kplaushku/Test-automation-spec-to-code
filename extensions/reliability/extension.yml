schema_version: "1.0"

extension:
  id: reliability
  name: "Suite Reliability"
  version: "0.1.0"
  description: "Turn trust into a metric: detect and quarantine flaky tests, and compute a reliability score from coverage, flakiness, false-greens, and drift. Enforces the constitution's flaky definition."
  category: visibility
  effect: read-write
  author: "Specto authors"
  repository: "https://github.com/kplaushku/Test-automation-spec-to-code"
  license: MIT

requires:
  speckit_version: ">=0.9.0"

provides:
  commands:
    - name: speckit.reliability.flake
      file: commands/speckit.reliability.flake.md
      description: "Run the suite N times, compute a per-test flake score, and quarantine (tag) tests that exceed the constitution's flaky threshold"
    - name: speckit.reliability.score
      file: commands/speckit.reliability.score.md
      description: "Compute a single suite reliability score from requirement coverage, flake rate, false-greens, and contract/selector drift"
      aliases: ["speckit.reliability"]

  config:
    - name: "reliability-config.yml"
      template: "config-template.yml"
      description: "Flake runs, thresholds, quarantine tag, and score weights"
      required: false

# Offer a reliability check after a QA run.
hooks:
  after_implement:
    command: "speckit.reliability.score"
    optional: true
    prompt: "Compute the suite reliability score now?"
    description: "Score suite reliability after implementation"

tags:
  - "reliability"
  - "flaky"
  - "quality"
  - "qa"
  - "testing"
