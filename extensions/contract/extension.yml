schema_version: "1.0"

extension:
  id: contract
  name: "API Contract Drift"
  version: "0.1.0"
  description: "Catch the silent failure mode where the suite is green but the API changed. Compares the live API's real schema and responses against what the spec expects, and flags drift."
  category: visibility
  effect: read-write
  author: "Specto authors"
  repository: "https://github.com/kplaushku/Test-automation-spec-to-code"
  license: MIT

requires:
  speckit_version: ">=0.9.0"

provides:
  commands:
    - name: speckit.contract.check
      file: commands/speckit.contract.check.md
      description: "Compare the live API (schema/responses, or an OpenAPI doc) against the spec's expectations and report drift: changed status codes, fields, types, and new required fields"
      aliases: ["speckit.contract"]

  config:
    - name: "contract-config.yml"
      template: "config-template.yml"
      description: "API base URL, optional OpenAPI source, and drift severity rules"
      required: false

tags:
  - "contract"
  - "api"
  - "drift"
  - "reliability"
  - "testing"
