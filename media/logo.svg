<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Specto logo">
  <title>Specto</title>
  <defs>
    <linearGradient id="stk-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f9d8b"/>
      <stop offset="1" stop-color="#0e6e7d"/>
    </linearGradient>
  </defs>
  <!-- rounded tile -->
  <rect x="8" y="8" width="184" height="184" rx="40" fill="url(#stk-bg)"/>
  <!-- spec document -->
  <rect x="56" y="44" width="64" height="84" rx="8" fill="#ffffff" opacity="0.95"/>
  <rect x="68" y="60" width="40" height="6" rx="3" fill="#0e6e7d"/>
  <rect x="68" y="74" width="40" height="6" rx="3" fill="#0e6e7d"/>
  <rect x="68" y="88" width="28" height="6" rx="3" fill="#0e6e7d"/>
  <!-- test flask overlapping bottom-right -->
  <g transform="translate(96 86)">
    <path d="M22 4 v22 l20 34 a8 8 0 0 1 -7 12 H9 a8 8 0 0 1 -7 -12 l20 -34 V4 Z"
          fill="#ffd24a" stroke="#0e6e7d" stroke-width="4" stroke-linejoin="round"/>
    <rect x="14" y="0" width="16" height="6" rx="3" fill="#0e6e7d"/>
  </g>
  <!-- pass checkmark -->
  <path d="M70 150 l16 16 l30 -34" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
